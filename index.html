    <!-- 密码保护样式 -->
    <style>
        #solara-auth-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2147483647;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            animation: solara-fadeIn 0.5s ease-in-out;
            margin: 0;
            padding: 0;
        }
        #solara-auth-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;

            max-width: 90vw;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: solara-slideUp 0.5s ease-out;
        }

            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .solara-input {
            width: 100%;
            padding: 15px 20px;
            margin: 15px 0;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background: white;
        }
        .solara-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .solara-button {
            width: 100%;
            padding: 15px;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .solara-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .solara-error {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        .solara-footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
        @keyframes solara-fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes solara-fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        @keyframes solara-slideUp {
            from { 
                opacity: 0;
                transform: translateY(30px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes solara-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        @media (max-width: 480px) {
            #solara-auth-container {
                min-width: 300px;
                padding: 30px 20px;
                margin: 20px;
            }
        }
    </style>
    
    <script>
        (function () {
            const ua = navigator.userAgent || "";
            const isMobileUA = /android|iphone|ipad|ipod|mobile|blackberry|phone|opera mini|windows phone/i.test(ua);
            const isSmallScreen = typeof window.matchMedia === "function" && window.matchMedia("(max-width: 820px)").matches;
            const isMobile = isMobileUA || isSmallScreen;
            window.__SOLARA_IS_MOBILE = isMobile;
            if (!isMobile) {
                document.documentElement.classList.add("desktop-view");
                const desktopLink = document.createElement("link");
                desktopLink.rel = "stylesheet";
                desktopLink.href = "css/desktop.css";
                desktopLink.id = "desktopStylesheet";
                document.head.appendChild(desktopLink);
                return;
            }
            document.documentElement.classList.add("mobile-view");
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = "css/mobile.css";
            link.id = "mobileStylesheet";
            document.head.appendChild(link);
            const setViewportUnit = () => {
                const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                document.documentElement.style.setProperty("--mobile-vh", `${viewportHeight}px`);
            };

            const applyBodyClass = () => {
                if (document.body) {
                    document.body.classList.add("mobile-view");
                    setViewportUnit();
                }
            };
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", applyBodyClass, { once: true });
            } else {
                applyBodyClass();
            }

            window.addEventListener("resize", setViewportUnit);
            window.addEventListener("orientationchange", setViewportUnit);
            if (window.visualViewport) {
                window.visualViewport.addEventListener("resize", setViewportUnit);
                window.visualViewport.addEventListener("scroll", setViewportUnit);
            }

            setViewportUnit();
        })();
    </script>

<!-- 密码保护脚本 -->
<script>
    class SolaraAuth {
        constructor() {
            this.password = '121314'; // 🔑 在这里修改密码
            this.sessionKey = 'solara_session_auth';
            this.wrapperId = 'solara-auth-wrapper';
            this.init();
        }

        init() {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => {
                    setTimeout(() => this.checkAuth(), 100);
                });
            } else {
                setTimeout(() => this.checkAuth(), 100);
            }
        }

        checkAuth() {
            const sessionAuth = sessionStorage.getItem(this.sessionKey);
            
            if (sessionAuth === 'true') {
                return;
            }
            
            setTimeout(() => this.showAuthModal(), 500);
        }

        // 提取主界面主题色
        extractThemeColors() {
            const colors = {
                primary: '#667eea',
                secondary: '#764ba2'
            };

            try {
                // 从body背景提取
                const bodyStyle = getComputedStyle(document.body);
                const bodyBg = bodyStyle.background || bodyStyle.backgroundColor;
                
                if (bodyBg && bodyBg.includes('gradient')) {
                    // 提取渐变颜色
                    const gradientColors = this.extractColorsFromGradient(bodyBg);
                    if (gradientColors.length >= 2) {
                        colors.primary = gradientColors[0];
                        colors.secondary = gradientColors[1];
                    }
                } else if (bodyBg && bodyBg !== 'rgba(0, 0, 0, 0)') {
                    // 使用纯色背景并生成渐变色
                    colors.primary = bodyBg;
                    colors.secondary = this.adjustColor(bodyBg, -40);
                }
                
            } catch (e) {
                console.log('使用默认主题色');
            }

            return colors;
        }

        // 从渐变字符串中提取颜色
        extractColorsFromGradient(gradientStr) {
            const colors = [];
            // 匹配十六进制颜色
            const hexMatches = gradientStr.match(/#[0-9A-Fa-f]{6}/g);
            if (hexMatches && hexMatches.length >= 2) {
                return hexMatches.slice(0, 2);
            }
            // 匹配rgb颜色
            const rgbMatches = gradientStr.match(/rgba?\(\s*\d+\s*,\s*\d+\s*,\s*\d+/g);
            if (rgbMatches && rgbMatches.length >= 2) {
                return rgbMatches.map(match => match + ')').slice(0, 2);
            }
            return colors;
        }

        // 调整颜色亮度
        adjustColor(color, amount) {
            try {
                if (color.startsWith('#')) {
                    let r = parseInt(color.slice(1, 3), 16);
                    let g = parseInt(color.slice(3, 5), 16);
                    let b = parseInt(color.slice(5, 7), 16);
                    
                    r = Math.max(0, Math.min(255, r + amount));
                    g = Math.max(0, Math.min(255, g + amount));
                    b = Math.max(0, Math.min(255, b + amount));
                    
                    return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
                }
            } catch (e) {
                // 如果颜色处理失败，返回默认值
            }
            
            return color;
        }

        showAuthModal() {
            if (document.getElementById(this.wrapperId)) return;

            // 自动提取主界面背景色
            const themeColors = this.extractThemeColors();
            
            const wrapper = document.createElement('div');
            wrapper.id = this.wrapperId;
            
            wrapper.style.cssText = `
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                width: 100vw !important;
                height: 100vh !important;
                z-index: 2147483647 !important;
                background: rgba(0,0,0,0.6) !important;
                backdrop-filter: blur(20px) !important;
                display: flex !important;
                justify-content: center !important;
                align-items: center !important;
                margin: 0 !important;
                padding: 0 !important;
            `;

            wrapper.innerHTML = `
                <div id="solara-auth-container">
                    <div class="solara-logo" style="
                        font-size: 28px;
                        font-weight: bold;
                        margin-bottom: 10px;
                        background: linear-gradient(135deg, ${themeColors.primary} 0%, ${themeColors.secondary} 100%);
                        -webkit-background-clip: text;
                        -webkit-text-fill-color: transparent;
                        background-clip: text;
                    ">小苹果Music</div>
                    
                    <div class="solara-subtitle" style="
                        color: #666;
                        margin-bottom: 30px;
                        font-size: 14px;
                    ">安全访问验证</div>
                    
                    <input type="password" 
                           id="solaraPasswordInput" 
                           class="solara-input"
                           placeholder="请输入访问密码" 
                           autocomplete="current-password"
                           style="
                               width: 100%;
                               padding: 15px 20px;
                               margin: 15px 0;
                               border: 2px solid #e1e5e9;
                               border-radius: 12px;
                               font-size: 16px;
                               transition: all 0.3s ease;
                               box-sizing: border-box;
                               background: white;
                               font-family: inherit;
                           ">
                    
                    <button id="solaraLoginBtn" class="solara-button" style="
                        width: 100%;
                        padding: 15px;
                        background: linear-gradient(135deg, ${themeColors.primary} 0%, ${themeColors.secondary} 100%);
                        color: white;
                        border: none;
                        border-radius: 12px;
                        font-size: 16px;
                        font-weight: 600;
                        cursor: pointer;
                        transition: all 0.3s ease;
                        margin-top: 10px;
                        font-family: inherit;
                    ">登录</button>
                    
                    <div id="solaraAuthError" class="solara-error" style="
                        color: #e74c3c;
                        margin-top: 15px;
                        font-size: 14px;
                        display: none;
                    ">密码错误，请重试！</div>
                </div>
            `;

            document.body.insertBefore(wrapper, document.body.firstChild);
            this.disablePageScroll();
            
            const input = document.getElementById('solaraPasswordInput');
            const loginBtn = document.getElementById('solaraLoginBtn');
            
            input.focus();
            
            loginBtn.addEventListener('click', () => this.verifyPassword());
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') this.verifyPassword();
            });
        }

        disablePageScroll() {
            const originalStyle = document.body.style.cssText;
            document.body.setAttribute('data-solara-original-style', originalStyle);
            document.body.style.overflow = 'hidden';
            document.documentElement.style.overflow = 'hidden';
        }

        enablePageScroll() {
            const originalStyle = document.body.getAttribute('data-solara-original-style');
            if (originalStyle) {
                document.body.style.cssText = originalStyle;
            } else {
                document.body.style.overflow = '';
                document.documentElement.style.overflow = '';
            }
        }

        verifyPassword() {
            const input = document.getElementById('solaraPasswordInput');
            const error = document.getElementById('solaraAuthError');
            const password = input.value.trim();

            if (password === this.password) {
                sessionStorage.setItem(this.sessionKey, 'true');
                this.hideAuthModal();
            } else {
                error.style.display = 'block';
                input.style.borderColor = '#e74c3c';
                input.value = '';
                input.focus();
                
                input.style.animation = 'solara-shake 0.5s';
                setTimeout(() => input.style.animation = '', 500);
            }
        }

        hideAuthModal() {
            const wrapper = document.getElementById(this.wrapperId);
            if (wrapper) {
                wrapper.style.animation = 'solara-fadeOut 0.3s ease-in-out';
                setTimeout(() => {
                    wrapper.remove();
                    this.enablePageScroll();
                }, 300);
            }
        }
    }

    // 添加动画样式
    const solaraStyles = document.createElement('style');
    solaraStyles.textContent = `
        @keyframes solara-fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes solara-fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes solara-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    `;
    document.head.appendChild(solaraStyles);

    // 初始化认证系统
    new SolaraAuth();
</script>

        const mobileScript = document.createElement('script');
        mobileScript.src = 'js/mobile.js';
        mobileScript.async = false;
        mobileScript.defer = false;
        document.body.appendChild(mobileScript);
    }
</script>
